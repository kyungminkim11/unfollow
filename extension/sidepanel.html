<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="sidepanel.css">
  <title>맞팔체커 Companion</title>
</head>
<body>
  <header class="appHeader">
    <div class="brandMark">M</div>
    <div><strong>맞팔체커 Companion</strong><span>사용자가 시작하는 팔로우 취소 작업</span></div>
  </header>

  <main>
    <section class="statusCard">
      <div class="statusTop"><span id="queueName">작업 목록 없음</span><strong id="runnerBadge" data-state="idle">대기</strong></div>
      <div class="stats">
        <div><span>전체</span><strong id="countTotal">0</strong></div>
        <div><span>완료</span><strong id="countSuccess">0</strong></div>
        <div><span>건너뜀</span><strong id="countSkipped">0</strong></div>
        <div><span>실패</span><strong id="countFailed">0</strong></div>
      </div>
      <div class="progress"><span id="progressBar"></span></div>
      <p id="runnerMessage" role="status" aria-live="polite">맞팔체커 웹에서 목록을 보내 주세요.</p>
    </section>

    <section class="settingsCard">
      <h2>이번 실행 설정</h2>
      <div class="fieldGrid">
        <label><span>이번에 처리할 수</span><input id="batchSize" type="number" min="1" max="30" value="10"></label>
        <label><span>작업 사이 최소 대기</span><input id="minDelay" type="number" min="5" max="120" value="8"><small>초</small></label>
        <label><span>작업 사이 최대 대기</span><input id="maxDelay" type="number" min="6" max="180" value="15"><small>초</small></label>
        <label><span>휴식 주기</span><input id="restEvery" type="number" min="1" max="30" value="10"><small>건마다</small></label>
        <label><span>휴식 시간</span><input id="restSeconds" type="number" min="30" max="900" value="60"><small>초</small></label>
      </div>
      <label class="confirmLine"><input id="confirmRun" type="checkbox"><span>선택된 계정의 Instagram 프로필에서 팔로우 취소 버튼을 자동으로 누르는 작업임을 확인했습니다.</span></label>
      <div class="buttonGrid">
        <button id="startButton" class="primary" type="button">작업 시작</button>
        <button id="pauseButton" type="button" disabled>일시정지</button>
        <button id="stopButton" class="danger" type="button" disabled>중지</button>
      </div>
    </section>

    <section class="queueCard">
      <div class="sectionHead"><div><h2>작업 목록</h2><p id="queueSummary">0개 계정</p></div><button id="resetErrors" type="button">실패 다시 대기</button></div>
      <div id="queueList" class="queueList"></div>
    </section>

    <section class="safetyCard">
      <strong>안전 중지 조건</strong>
      <p>로그인 화면, 보안 확인·챌린지, 팔로잉 버튼 미탐지 또는 연속 오류가 감지되면 작업을 멈춥니다. 비밀번호·쿠키·세션 값을 읽지 않고 Instagram 화면의 버튼만 처리합니다.</p>
    </section>
  </main>

  <script src="sidepanel.js"></script>
</body>
</html>
