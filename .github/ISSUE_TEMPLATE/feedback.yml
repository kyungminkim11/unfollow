name: 맞팔체커 피드백
description: 오류 신고, 사용성 문제, 기능 제안을 남겨주세요.
title: "[피드백] "
body:
  - type: markdown
    attributes:
      value: |
        맞팔체커를 이용해 주셔서 감사합니다. 개인정보, Instagram 비밀번호, 쿠키, 원본 ZIP 파일은 첨부하지 마세요.

  - type: dropdown
    id: category
    attributes:
      label: 피드백 유형
      options:
        - 오류 또는 작동 문제
        - 사용성·디자인 개선
        - 기능 제안
        - 데이터 분석 결과 문의
        - 기타
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 어떤 문제가 있었나요?
      description: 문제가 발생한 화면과 순서, 기대한 동작을 구체적으로 적어주세요.
      placeholder: |
        1. 메인 화면에서 …을 눌렀습니다.
        2. 현재는 …처럼 동작합니다.
        3. 기대한 동작은 …입니다.
    validations:
      required: true

  - type: input
    id: page
    attributes:
      label: 문제가 발생한 페이지
      placeholder: https://unfollow.lavalabs.co.kr/

  - type: textarea
    id: environment
    attributes:
      label: 사용 환경
      description: 브라우저, 기기, 화면 크기, 익스텐션 설치 여부 등을 적어주세요.
      placeholder: Chrome 150 / Windows 11 / 1536×900 / 익스텐션 설치됨

  - type: textarea
    id: attachments
    attributes:
      label: 화면 캡처 또는 추가 자료
      description: 민감한 계정명과 개인정보를 가린 뒤 첨부해 주세요.

  - type: checkboxes
    id: privacy
    attributes:
      label: 개인정보 확인
      options:
        - label: Instagram 비밀번호, 쿠키, 인증 코드, 원본 ZIP 등 민감정보를 포함하지 않았습니다.
          required: true
