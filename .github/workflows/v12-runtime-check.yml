name: V12 Runtime Check

on:
  push:
    branches: [main]
    paths:
      - 'scripts/build-pages.mjs'
      - 'scripts/build-release.mjs'
      - 'scripts/deploy-smoke.mjs'
      - 'scripts/create-smoke-fixtures.py'
      - 'assets/release-hardening-v12.css'
      - 'assets/release-hardening-v12.js'
      - '.github/workflows/v12-runtime-check.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: v12-runtime-check
  cancel-in-progress: true

jobs:
  runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache Playwright browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-v12

      - name: Run complete runtime diagnostics
        id: runtime
        continue-on-error: true
        env:
          SMOKE_URL: http://127.0.0.1:4173/
        run: |
          mkdir -p audit
          set +e
          exec > >(tee audit/v12-runtime-check.txt) 2>&1
          STATUS=0

          echo "commit=$GITHUB_SHA"
          echo "started_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          echo '## Build release'
          node scripts/build-release.mjs
          STATUS=$?

          if [ "$STATUS" -eq 0 ]; then
            echo '## Restore preview image'
            base64 --decode og-image.txt > dist/og-image.png
            STATUS=$?
          fi

          if [ "$STATUS" -eq 0 ]; then
            echo '## Create fixtures'
            python3 scripts/create-smoke-fixtures.py
            STATUS=$?
          fi

          if [ "$STATUS" -eq 0 ]; then
            echo '## Install audit packages'
            npm install --no-save playwright @axe-core/playwright
            STATUS=$?
          fi

          if [ "$STATUS" -eq 0 ]; then
            echo '## Install Chromium'
            npx playwright install chromium --with-deps
            STATUS=$?
          fi

          if [ "$STATUS" -eq 0 ]; then
            echo '## Start preview server'
            python3 -m http.server 4173 --directory dist > /tmp/v12-runtime-server.log 2>&1 &
            SERVER_READY=1
            for i in {1..20}; do
              if curl -fsS http://127.0.0.1:4173/ >/dev/null; then SERVER_READY=0; break; fi
              sleep 1
            done
            if [ "$SERVER_READY" -ne 0 ]; then
              cat /tmp/v12-runtime-server.log
              STATUS=1
            fi
          fi

          if [ "$STATUS" -eq 0 ]; then
            echo '## Run browser smoke tests'
            node scripts/deploy-smoke.mjs
            STATUS=$?
          fi

          echo "finished_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "exit_code=$STATUS"
          exit $STATUS

      - name: Commit runtime report
        if: always()
        run: |
          test -f audit/v12-runtime-check.txt || printf 'Runtime workflow stopped before diagnostics.\n' > audit/v12-runtime-check.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add audit/v12-runtime-check.txt
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'chore: record v12 runtime check [skip ci]'
          git push

      - name: Fail unsuccessful runtime check
        if: steps.runtime.outcome != 'success'
        run: exit 1
