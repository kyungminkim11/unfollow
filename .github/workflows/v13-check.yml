name: V14 Design Check

on:
  pull_request:
    branches: [main]
    paths:
      - 'assets/design-v14.css'
      - 'assets/design-v14-fixes.css'
      - 'assets/design-v14.js'
      - 'assets/business-info.js'
      - 'scripts/design-v14-smoke.mjs'
      - 'scripts/v13-smoke.mjs'
      - 'scripts/deploy-smoke.mjs'
      - '.github/workflows/pages.yml'
      - '.github/workflows/release-audit.yml'
      - '.github/workflows/v13-check.yml'
      - 'sw.js'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: v14-design-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache Playwright browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-v14

      - name: Syntax checks
        run: |
          node --check assets/design-v14.js
          node --check assets/v13-features.js
          node --check scripts/build-v13.mjs
          node --check scripts/design-v14-smoke.mjs
          node --check scripts/v13-smoke.mjs
          node --check sw.js

      - name: Build design release
        run: |
          node scripts/build-v13.mjs
          base64 --decode og-image.txt > dist/og-image.png
          test -f dist/assets/design-v14.css
          test -f dist/assets/design-v14-fixes.css
          test -f dist/assets/design-v14.js
          test -f dist/assets/v13-features.js
          grep -q 'design-v14.js' dist/assets/business-info.js
          grep -q 'design-v14.css' dist/assets/design-v14.js
          grep -q 'design-v14-fixes.css' dist/assets/design-v14.js
          grep -R -q 'WORKSPACE_SIGNATURE_KEY' dist/assets/generated-inline-*.js
          grep -q 'unfollow-v14' dist/sw.js

      - name: Create fixtures
        run: python3 scripts/create-smoke-fixtures.py

      - name: Install browser tools
        run: |
          npm install --no-save playwright @axe-core/playwright
          npx playwright install chromium --with-deps

      - name: Start preview
        run: |
          python3 -m http.server 4173 --directory dist > /tmp/v14-preview.log 2>&1 &
          for i in {1..20}; do
            curl -fsS http://127.0.0.1:4173/ >/dev/null && exit 0
            sleep 1
          done
          cat /tmp/v14-preview.log
          exit 1

      - name: Existing feature regression tests
        id: v12
        continue-on-error: true
        env:
          SMOKE_URL: http://127.0.0.1:4173/
        run: |
          mkdir -p audit
          node scripts/deploy-smoke.mjs | tee audit/v12-regression.json

      - name: V13 feature tests
        id: v13
        continue-on-error: true
        env:
          SMOKE_URL: http://127.0.0.1:4173/
        run: node scripts/v13-smoke.mjs | tee audit/v13-features.json

      - name: V14 visual layout tests
        id: v14
        continue-on-error: true
        env:
          SMOKE_URL: http://127.0.0.1:4173/
        run: node scripts/design-v14-smoke.mjs

      - name: Upload browser and design reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v14-design-reports
          path: |
            audit/v12-regression.json
            audit/v13-features.json
            audit/design-v14-report.json
            audit/design-v14-*.png
          if-no-files-found: warn
          retention-days: 7

      - name: Enforce checks
        if: steps.v12.outcome != 'success' || steps.v13.outcome != 'success' || steps.v14.outcome != 'success'
        run: |
          echo "Existing regression: ${{ steps.v12.outcome }}"
          echo "V13 features: ${{ steps.v13.outcome }}"
          echo "V14 design: ${{ steps.v14.outcome }}"
          exit 1
