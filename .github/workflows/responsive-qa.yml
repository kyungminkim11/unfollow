name: Responsive browser QA

on:
  pull_request:
    branches: [main]
    paths:
      - 'index.html'
      - 'assets/**'
      - 'v9/**'
      - 'sw.js'
      - '.github/ISSUE_TEMPLATE/feedback.yml'
      - 'tests/responsive-layout.cjs'
      - 'tests/feedback-flow.cjs'
      - '.github/workflows/responsive-qa.yml'
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'assets/**'
      - 'v9/**'
      - 'sw.js'
      - '.github/ISSUE_TEMPLATE/feedback.yml'
      - 'tests/responsive-layout.cjs'
      - 'tests/feedback-flow.cjs'
      - '.github/workflows/responsive-qa.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  responsive-layout:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Playwright
        run: |
          mkdir -p /tmp/matchal-qa
          cd /tmp/matchal-qa
          npm init -y >/dev/null 2>&1
          npm install --no-save --no-package-lock playwright@1.51.1
          npx playwright install --with-deps chromium

      - name: Start static server
        if: github.event_name != 'push'
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/matchal-http.log 2>&1 &
          echo $! > /tmp/matchal-http.pid
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:4173/ >/dev/null; then exit 0; fi
            sleep 1
          done
          cat /tmp/matchal-http.log
          exit 1

      - name: Wait for production deployment
        if: github.event_name == 'push'
        run: |
          for i in {1..60}; do
            url="https://unfollow.lavalabs.co.kr/?deploy=${GITHUB_SHA}-${i}"
            body="$(curl -fsSL --retry 2 --connect-timeout 10 -H 'Cache-Control: no-cache' "$url" || true)"
            if printf '%s' "$body" | grep -Fq 'business-info.js?v=14.5'; then
              echo "Production is serving the feedback release."
              exit 0
            fi
            echo "Waiting for production deployment ($i/60)..."
            sleep 10
          done
          echo "Production did not expose the expected release marker in time."
          exit 1

      - name: Run responsive diagnostics
        env:
          NODE_PATH: /tmp/matchal-qa/node_modules
          QA_URL: ${{ github.event_name == 'push' && 'https://unfollow.lavalabs.co.kr/' || 'http://127.0.0.1:4173/' }}
          QA_OUT: ${{ github.event_name == 'push' && 'qa-live-artifacts' || 'qa-artifacts' }}
          DEPLOY_SHA: ${{ github.sha }}
        run: timeout --signal=TERM 240s node tests/responsive-layout.cjs

      - name: Run feedback interaction diagnostics
        env:
          NODE_PATH: /tmp/matchal-qa/node_modules
          QA_URL: ${{ github.event_name == 'push' && 'https://unfollow.lavalabs.co.kr/' || 'http://127.0.0.1:4173/' }}
          QA_OUT: ${{ github.event_name == 'push' && 'qa-live-artifacts' || 'qa-artifacts' }}
          DEPLOY_SHA: ${{ github.sha }}
        run: timeout --signal=TERM 120s node tests/feedback-flow.cjs

      - name: Upload screenshots and metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event_name == 'push' && 'responsive-qa-live' || 'responsive-qa' }}
          path: ${{ github.event_name == 'push' && 'qa-live-artifacts' || 'qa-artifacts' }}
          if-no-files-found: warn
          retention-days: 14

      - name: Print server log
        if: failure() && github.event_name != 'push'
        run: cat /tmp/matchal-http.log || true
