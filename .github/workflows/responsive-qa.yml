name: Responsive browser QA

on:
  pull_request:
    branches: [main]
    paths:
      - 'index.html'
      - 'assets/**'
      - 'v9/**'
      - 'sw.js'
      - 'tests/responsive-layout.cjs'
      - '.github/workflows/responsive-qa.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  responsive-layout:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Playwright
        run: |
          mkdir -p /tmp/matchal-qa
          cd /tmp/matchal-qa
          npm init -y >/dev/null 2>&1
          npm install --no-save --no-package-lock playwright@1.51.1
          npx playwright install --with-deps chromium

      - name: Start static server
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/matchal-http.log 2>&1 &
          echo $! > /tmp/matchal-http.pid
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:4173/ >/dev/null; then exit 0; fi
            sleep 1
          done
          cat /tmp/matchal-http.log
          exit 1

      - name: Run responsive diagnostics
        env:
          NODE_PATH: /tmp/matchal-qa/node_modules
          QA_URL: http://127.0.0.1:4173/
          QA_OUT: qa-artifacts
        run: node tests/responsive-layout.cjs

      - name: Upload screenshots and metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: responsive-qa
          path: qa-artifacts
          if-no-files-found: warn
          retention-days: 14

      - name: Print server log
        if: failure()
        run: cat /tmp/matchal-http.log || true
