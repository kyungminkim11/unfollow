name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache Playwright browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-v23

      - name: Build v23 static site
        run: node scripts/build-v13.mjs

      - name: Package Companion extension
        run: |
          mkdir -p dist/downloads
          (cd extension && zip -qr ../dist/downloads/matchal-companion-v23.zip .)
          cp dist/downloads/matchal-companion-v23.zip dist/downloads/matchal-companion-v22.zip

      - name: Restore social preview image
        run: base64 --decode og-image.txt > dist/og-image.png

      - name: Validate hardened v23 output
        run: |
          test -f dist/index.html
          test -f dist/CNAME
          test -f dist/robots.txt
          test -f dist/sitemap.xml
          test -f dist/manifest.webmanifest
          test -f dist/og-image.png
          test -f dist/assets/business-info.js
          test -f dist/assets/release-hardening-v12.css
          test -f dist/assets/release-hardening-v12.js
          test -f dist/assets/v13-features.css
          test -f dist/assets/v13-features.js
          test -f dist/assets/design-v14.css
          test -f dist/assets/design-v14-fixes.css
          test -f dist/assets/design-v14.js
          test -f dist/assets/automation-v22.css
          test -f dist/assets/automation-v22.js
          test -f dist/assets/automation-parser-v22.js
          test -f dist/assets/relationship-scan-v23.css
          test -f dist/assets/relationship-scan-v23.js
          test -f dist/assets/generated-inline-1.js
          test -f dist/downloads/matchal-companion-v23.zip
          test -f dist/downloads/matchal-companion-v22.zip
          unzip -p dist/downloads/matchal-companion-v23.zip manifest.json | grep -q '"manifest_version": 3'
          unzip -p dist/downloads/matchal-companion-v23.zip manifest.json | grep -q '"version": "23.0.0"'
          unzip -p dist/downloads/matchal-companion-v23.zip manifest.json | grep -q '"sidePanel"'
          unzip -l dist/downloads/matchal-companion-v23.zip | grep -q 'instagram-scan.js'
          grep -q "인스타 맞팔 확인" dist/index.html
          grep -q "unfollow.lavalabs.co.kr" dist/index.html
          grep -q "455-23-01867" dist/index.html
          grep -q "Content-Security-Policy" dist/index.html
          grep -q "design-v14.js" dist/assets/business-info.js
          grep -q "automation-v22.js" dist/assets/business-info.js
          grep -q "automation-parser-v22.js" dist/assets/business-info.js
          grep -q "relationship-scan-v23.js" dist/assets/business-info.js
          grep -q "design-v14.css" dist/assets/design-v14.js
          grep -q "design-v14-fixes.css" dist/assets/design-v14.js
          grep -R -q "WORKSPACE_SIGNATURE_KEY" dist/assets/generated-inline-*.js
          grep -R -q "ZIP_LIMITS" dist/assets/generated-inline-*.js
          grep -q "unfollow-v23" dist/sw.js
          ! grep -R "kyungminkim11/matchal-checker" dist
          ! grep -R "code.iconify.design" dist
          ! grep -R "cdn.jsdelivr.net" dist
          ! grep -R "bluepen_shop" dist
          ! grep -R "tokyo_stationery" dist

      - name: Create browser-test fixtures
        run: python3 scripts/create-smoke-fixtures.py

      - name: Install browser test tools
        run: |
          npm install --no-save playwright @axe-core/playwright
          npx playwright install chromium --with-deps

      - name: Start production preview
        run: |
          python3 -m http.server 4173 --directory dist > /tmp/unfollow-pages-server.log 2>&1 &
          for i in {1..20}; do
            curl -fsS http://127.0.0.1:4173/ >/dev/null && exit 0
            sleep 1
          done
          cat /tmp/unfollow-pages-server.log
          exit 1

      - name: Run existing regression tests
        id: v12
        continue-on-error: true
        env:
          SMOKE_URL: http://127.0.0.1:4173/
        run: |
          mkdir -p audit
          node scripts/deploy-smoke.mjs | tee audit/pages-v12-regression.json

      - name: Run v13 feature tests
        id: v13
        continue-on-error: true
        env:
          SMOKE_URL: http://127.0.0.1:4173/
        run: node scripts/v13-smoke.mjs | tee audit/pages-v13-features.json

      - name: Run v14 visual tests
        id: v14
        continue-on-error: true
        env:
          SMOKE_URL: http://127.0.0.1:4173/
        run: node scripts/design-v14-smoke.mjs

      - name: Run v22 automation checks
        id: v22
        continue-on-error: true
        env:
          SMOKE_URL: http://127.0.0.1:4173/
        run: node scripts/automation-v22-smoke.mjs

      - name: Run v23 relationship scan checks
        id: v23
        continue-on-error: true
        env:
          SMOKE_URL: http://127.0.0.1:4173/
        run: node scripts/relationship-scan-v23-smoke.mjs

      - name: Upload Pages test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pages-v23-reports
          path: |
            audit/pages-v12-regression.json
            audit/pages-v13-features.json
            audit/design-v14-report.json
            audit/design-v14-*.png
            audit/automation-v22-report.json
            audit/automation-v22-*.png
            audit/relationship-scan-v23-report.json
            audit/relationship-scan-v23-*.png
          if-no-files-found: warn
          retention-days: 7

      - name: Enforce release checks
        if: steps.v12.outcome != 'success' || steps.v13.outcome != 'success' || steps.v14.outcome != 'success' || steps.v22.outcome != 'success' || steps.v23.outcome != 'success'
        run: |
          echo "Existing regression: ${{ steps.v12.outcome }}"
          echo "V13 features: ${{ steps.v13.outcome }}"
          echo "V14 design: ${{ steps.v14.outcome }}"
          echo "V22 automation: ${{ steps.v22.outcome }}"
          echo "V23 relationship scan: ${{ steps.v23.outcome }}"
          exit 1

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

  report:
    needs: [build, deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main for status record
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Record Pages workflow outcome
        env:
          SOURCE_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          REPOSITORY: ${{ github.repository }}
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          DEPLOYED_PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        run: |
          git pull --rebase origin main
          mkdir -p audit
          {
            echo 'V23_PAGES_WORKFLOW_STATUS'
            echo "source_commit=$SOURCE_SHA"
            echo "checked_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "run_id=$RUN_ID"
            echo "run_attempt=$RUN_ATTEMPT"
            echo "run_url=https://github.com/$REPOSITORY/actions/runs/$RUN_ID"
            echo "build_result=$BUILD_RESULT"
            echo "deploy_result=$DEPLOY_RESULT"
            echo "page_url=$DEPLOYED_PAGE_URL"
          } > audit/pages-v14-status.txt
          if [ "$BUILD_RESULT" = 'success' ] && [ "$DEPLOY_RESULT" = 'success' ]; then
            {
              echo 'V23_PAGES_DEPLOYED'
              echo "source_commit=$SOURCE_SHA"
              echo "deployed_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
              echo "run_id=$RUN_ID"
              echo "page_url=$DEPLOYED_PAGE_URL"
            } > audit/pages-v14-deploy.txt
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add audit/pages-v14-status.txt
          test -f audit/pages-v14-deploy.txt && git add audit/pages-v14-deploy.txt || true
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'chore: record v23 Pages workflow status [skip ci]'
          git push origin main