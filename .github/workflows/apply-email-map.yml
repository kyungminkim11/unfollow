name: Apply Unfollow email mapping
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '[email-map]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update service and privacy addresses
        shell: python
        run: |
          from pathlib import Path
          workflow = Path('.github/workflows/apply-email-map.yml')
          for path in Path('.').rglob('*'):
              if not path.is_file() or '.git' in path.parts or path == workflow:
                  continue
              try: old = path.read_text(encoding='utf-8')
              except (UnicodeDecodeError, OSError): continue
              target = 'privacy@lavalabs.co.kr' if 'privacy' in str(path).lower() else 'unfollow@lavalabs.co.kr'
              new = old.replace('lavalabs.ceo@gmail.com', target).replace('info@lavalabs.co.kr', target)
              if new != old: path.write_text(new, encoding='utf-8')
          workflow.unlink()
      - name: Commit changes
        run: |
          git config user.name "Lava Labs Automation"
          git config user.email "dev@lavalabs.co.kr"
          git add -A
          git diff --cached --quiet || git commit -m "chore: update Unfollow contact emails [email-map]"
          git push
