name: Extract Core Snippets

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/extract-core.yml'
      - 'scripts/build-pages.mjs'
      - 'scripts/build-release.mjs'
      - 'scripts/extract-core-snippets.mjs'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Build production HTML
        run: node scripts/build-release.mjs
      - name: Extract core snippets
        run: node scripts/extract-core-snippets.mjs
      - name: Commit snippets
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add audit/core-snippets.json audit/core-snippets.md
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'chore: extract core snippets [skip ci]'
          git push
