name: V24 Relationship Dashboard Check

on:
  pull_request:
    paths:
      - 'extension/**'
      - 'assets/relationship-dashboard-v24.*'
      - 'assets/relationship-scan-v23.*'
      - 'assets/extension-site.js'
      - 'assets/business-info.js'
      - 'scripts/relationship-dashboard-v24-smoke.mjs'
      - 'scripts/build-v13.mjs'
      - 'index.html'
      - 'sw.js'
      - '.github/workflows/v24-relationship-dashboard-check.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Syntax checks
        run: |
          node --check assets/relationship-dashboard-v24.js
          node --check assets/relationship-scan-v23.js
          node --check assets/extension-site.js
          node --check extension/background.js
          node --check extension/content-bridge.js
          node --check extension/sidepanel-v24.js
          node --check scripts/relationship-dashboard-v24-smoke.mjs
          node -e "const m=require('./extension/manifest.json'); if(m.manifest_version!==3||m.version!=='24.0.0') process.exit(1)"

      - name: Build production site
        run: node scripts/build-v13.mjs

      - name: Package Companion v24
        run: |
          mkdir -p dist/downloads
          (cd extension && zip -qr ../dist/downloads/matchal-companion-v24.zip .)
          cp dist/downloads/matchal-companion-v24.zip dist/downloads/matchal-companion-v23.zip

      - name: Install browser test tools
        run: |
          npm install --no-save playwright @axe-core/playwright
          npx playwright install chromium --with-deps

      - name: Start production preview
        run: |
          python3 -m http.server 4173 --directory dist > /tmp/unfollow-v24-server.log 2>&1 &
          for i in {1..20}; do
            curl -fsS http://127.0.0.1:4173/ >/dev/null && exit 0
            sleep 1
          done
          cat /tmp/unfollow-v24-server.log
          exit 1

      - name: Relationship dashboard audit
        env:
          SMOKE_URL: http://127.0.0.1:4173/
        run: node scripts/relationship-dashboard-v24-smoke.mjs

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v24-relationship-dashboard-reports
          path: |
            audit/relationship-dashboard-v24-report.json
            audit/relationship-dashboard-v24-*.png
          if-no-files-found: warn
          retention-days: 7