name: Live feedback QA

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/live-feedback-qa.yml'

permissions:
  contents: read

jobs:
  live-feedback:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Confirm deployed feedback release
        run: |
          for i in {1..30}; do
            body="$(curl -fsSL --retry 2 --connect-timeout 10 -H 'Cache-Control: no-cache' "https://unfollow.lavalabs.co.kr/?feedback-live=${GITHUB_SHA}-${i}" || true)"
            if printf '%s' "$body" | grep -Fq 'business-info.js?v=14.5'; then
              echo "Feedback release is live."
              exit 0
            fi
            sleep 5
          done
          echo "Feedback release marker was not found."
          exit 1

      - name: Prepare Playwright
        run: |
          mkdir -p /tmp/matchal-live-feedback
          cd /tmp/matchal-live-feedback
          npm init -y >/dev/null 2>&1
          npm install --no-save --no-package-lock playwright@1.51.1
          npx playwright install --with-deps chromium

      - name: Test deployed feedback interaction
        env:
          NODE_PATH: /tmp/matchal-live-feedback/node_modules
          QA_URL: https://unfollow.lavalabs.co.kr/
          QA_OUT: qa-live-feedback
          DEPLOY_SHA: a07f0c4eff68c899322305a3b5de2022bb844942
        run: timeout --signal=TERM 120s node tests/feedback-flow.cjs

      - name: Upload live feedback evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-feedback-qa
          path: qa-live-feedback
          if-no-files-found: warn
          retention-days: 14
