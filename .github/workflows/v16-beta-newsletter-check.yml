name: V16 Beta Newsletter Check

on:
  pull_request:
    branches: [main]
    paths:
      - 'assets/monetization-v16.js'
      - 'assets/monetization-v16.css'
      - 'assets/newsletter-page-v16.js'
      - 'assets/site-pages-v16.css'
      - 'assets/business-info.js'
      - 'assets/pwa-enhancements.js'
      - 'pages/**'
      - 'scripts/build-v13.mjs'
      - 'scripts/newsletter-v16-smoke.mjs'
      - 'sw.js'
      - 'manifest.webmanifest'
      - 'sitemap.xml'
      - '.github/workflows/v16-beta-newsletter-check.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: v16-beta-newsletter-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache Playwright browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-v16

      - name: Syntax checks
        run: |
          node --check assets/monetization-v16.js
          node --check assets/newsletter-page-v16.js
          node --check assets/business-info.js
          node --check assets/pwa-enhancements.js
          node --check scripts/build-v13.mjs
          node --check scripts/newsletter-v16-smoke.mjs
          node --check sw.js

      - name: Build production site
        run: |
          node scripts/build-v13.mjs
          base64 --decode og-image.txt > dist/og-image.png
          test -f dist/assets/monetization-v16.js
          test -f dist/assets/monetization-v16.css
          test -f dist/assets/newsletter-page-v16.js
          test -f dist/assets/site-pages-v16.css
          for page in premium newsletter data privacy terms; do test -f "dist/$page/index.html"; done
          grep -q 'monetization-v16.js' dist/assets/business-info.js
          grep -q 'unfollow-v16' dist/sw.js
          grep -q '희망자 뉴스레터' dist/newsletter/index.html

      - name: Create fixtures
        run: python3 scripts/create-smoke-fixtures.py

      - name: Install browser test tools
        run: |
          npm install --no-save playwright @axe-core/playwright
          npx playwright install chromium --with-deps

      - name: Start production preview
        run: |
          python3 -m http.server 4173 --directory dist > /tmp/unfollow-v16.log 2>&1 &
          for i in {1..20}; do
            curl -fsS http://127.0.0.1:4173/ >/dev/null && exit 0
            sleep 1
          done
          cat /tmp/unfollow-v16.log
          exit 1

      - name: Existing analysis regression
        id: existing
        continue-on-error: true
        run: node scripts/deploy-smoke.mjs > audit/v16-existing-regression.log 2>&1
        env:
          SMOKE_URL: http://127.0.0.1:4173/

      - name: Relationship comparison regression
        id: comparison
        continue-on-error: true
        run: node scripts/v13-smoke.mjs > audit/v16-comparison-regression.log 2>&1
        env:
          SMOKE_URL: http://127.0.0.1:4173/

      - name: V15 service regression
        id: service
        continue-on-error: true
        run: node scripts/service-v15-smoke.mjs > audit/v16-service-regression.log 2>&1
        env:
          SMOKE_URL: http://127.0.0.1:4173/

      - name: V16 beta and newsletter audit
        id: newsletter
        continue-on-error: true
        run: node scripts/newsletter-v16-smoke.mjs > audit/newsletter-v16-run.log 2>&1
        env:
          SMOKE_URL: http://127.0.0.1:4173/

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v16-beta-newsletter-reports
          path: |
            audit/v16-existing-regression.log
            audit/v16-comparison-regression.log
            audit/v16-service-regression.log
            audit/newsletter-v16-run.log
            audit/newsletter-v16-report.json
            audit/newsletter-v16-*.png
          if-no-files-found: warn
          retention-days: 7

      - name: Enforce checks
        if: always() && (steps.existing.outcome != 'success' || steps.comparison.outcome != 'success' || steps.service.outcome != 'success' || steps.newsletter.outcome != 'success')
        run: |
          echo "Existing: ${{ steps.existing.outcome }}"
          echo "Comparison: ${{ steps.comparison.outcome }}"
          echo "Service: ${{ steps.service.outcome }}"
          echo "Newsletter: ${{ steps.newsletter.outcome }}"
          exit 1
