<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>맞팔체커</title><meta name="description" content="로그인 없이 Instagram 데이터 ZIP으로 맞팔을 안전하게 확인하는 브라우저 로컬 분석 도구"><meta name="theme-color" content="#6557ff"><style>html,body{margin:0;min-height:100%;background:#f7f8fc;font-family:system-ui,-apple-system,"Segoe UI",sans-serif}#boot{min-height:100vh;display:grid;place-items:center;color:#475467}.box{padding:24px;text-align:center}.spin{width:38px;height:38px;margin:0 auto 14px;border:4px solid #e5e7ff;border-top-color:#6557ff;border-radius:50%;animation:s .8s linear infinite}@keyframes s{to{transform:rotate(360deg)}}</style></head><body><div id="boot"><div class="box"><div class="spin"></div><strong>맞팔체커를 준비하고 있습니다</strong><p>브라우저에서 안전하게 불러오는 중입니다.</p></div></div><script>(async()=>{try{const payloadFiles=['v9/part1.txt','v9/part2.txt','v9/part3.txt'];const cssFiles=['assets/v8-base.css','assets/v8-responsive.css','assets/extension-site.css'];const [parts,styles]=await Promise.all([Promise.all(payloadFiles.map(async x=>{const r=await fetch(new URL(x,location.origin+'/'),{cache:'no-store'});if(!r.ok)throw new Error('payload '+x+' '+r.status);return r.text()})),Promise.all(cssFiles.map(async x=>{const r=await fetch(new URL(x,location.origin+'/'),{cache:'no-store'});if(!r.ok)throw new Error('style '+x+' '+r.status);return r.text()}))]);const b64=parts.join('');const raw=atob(b64),u=new Uint8Array(raw.length);for(let i=0;i<raw.length;i++)u[i]=raw.charCodeAt(i);let html=await new Response(new Blob([u]).stream().pipeThrough(new DecompressionStream('gzip'))).text();html=html.replaceAll('https://kyungminkim11.github.io/matchal-checker/','/').replaceAll('https://kyungminkim11.github.io/unfollow/','/').replaceAll('/matchal-checker/','/').replaceAll('/unfollow/','/');const injected='<base href="/"><style id="unfollow-custom-domain-styles">'+styles.join('\n')+'</style><script src="https://code.iconify.design/3/3.1.1/iconify.min.js"><\/script><script src="/assets/extension-site.js?v=1" defer><\/script>';html=html.replace(/<head([^>]*)>/i,'<head$1>'+injected);document.open();document.write(html);document.close()}catch(e){console.error(e);document.getElementById('boot').innerHTML='<div class="box"><strong>페이지를 불러오지 못했습니다.</strong><p>'+String(e.message||e)+'</p><button onclick="location.reload()" style="margin-top:12px;padding:10px 16px;border:0;border-radius:10px;background:#6557ff;color:#fff;font-weight:700">다시 불러오기</button></div>'}})();</script></body></html>
