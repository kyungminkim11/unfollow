<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>맞팔체커</title><meta name="description" content="로그인 없이 Instagram 데이터 ZIP으로 맞팔을 안전하게 확인하고 직접 정리하는 브라우저 로컬 도구"><meta name="theme-color" content="#6557ff"><link rel="manifest" href="manifest.webmanifest?v=910"><link rel="icon" href="icon.svg" type="image/svg+xml"><style>html,body{margin:0;min-height:100%;background:#f7f8fc;font-family:ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",Arial,sans-serif}#boot{min-height:100vh;display:grid;place-items:center;color:#475467}.box{padding:24px;text-align:center}.brand{width:54px;height:54px;margin:0 auto 16px;border-radius:17px;background:linear-gradient(145deg,#6657ff,#8b5cf6 55%,#ec4899);display:grid;place-items:center;color:#fff;font-size:20px;font-weight:900;box-shadow:0 14px 34px rgba(101,87,255,.25)}.spin{width:30px;height:30px;margin:14px auto;border:3px solid #e5e7ff;border-top-color:#6557ff;border-radius:50%;animation:s .8s linear infinite}@keyframes s{to{transform:rotate(360deg)}}p{font-size:13px;color:#667085}</style></head><body><div id="boot"><div class="box"><div class="brand">M</div><strong>맞팔체커를 준비하고 있습니다</strong><div class="spin"></div><p>ZIP 데이터는 브라우저 안에서만 분석됩니다.</p></div></div><script>(async()=>{try{const files=['release/v910/part1.txt','release/v910/part2.txt','release/v910/part3.txt','release/v910/part4.txt','release/v910/part5.txt','release/v910/part6.txt'];const b64=(await Promise.all(files.map(async x=>{const r=await fetch(x,{cache:'no-store'});if(!r.ok)throw new Error(x);return r.text()}))).join('');const raw=atob(b64),u=new Uint8Array(raw.length);for(let i=0;i<raw.length;i++)u[i]=raw.charCodeAt(i);if(typeof DecompressionStream==='undefined')throw new Error('unsupported');const html=await new Response(new Blob([u]).stream().pipeThrough(new DecompressionStream('gzip'))).text();document.open();document.write(html);document.close()}catch(e){console.error(e);document.getElementById('boot').innerHTML='<div class="box"><div class="brand">M</div><strong>페이지를 불러오지 못했습니다.</strong><p>Chrome, Edge 또는 Samsung Internet 최신 버전에서 다시 열어주세요.</p><button onclick="location.reload()" style="height:44px;padding:0 18px;border:0;border-radius:12px;background:#6557ff;color:#fff;font-weight:800">다시 시도</button></div>'}})();</script></body></html>
