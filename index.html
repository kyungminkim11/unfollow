<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>맞팔체커</title>
  <meta name="description" content="Instagram 공식 데이터 ZIP 또는 Chrome Companion 웹 스캔으로 팔로워·팔로잉·맞팔 아닌 명단을 확인하는 브라우저 로컬 도구">
  <meta name="theme-color" content="#6557ff">
  <style>
    html,body{margin:0;min-height:100%;background:#f7f8fc;font-family:system-ui,-apple-system,"Segoe UI",sans-serif}
    #boot{min-height:100vh;display:grid;place-items:center;color:#475467}
    .box{padding:24px;text-align:center}
    .spin{width:38px;height:38px;margin:0 auto 14px;border:4px solid #e5e7ff;border-top-color:#6557ff;border-radius:50%;animation:s .8s linear infinite}
    @keyframes s{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div id="boot">
    <div class="box">
      <div class="spin"></div>
      <strong>맞팔체커를 준비하고 있습니다</strong>
      <p>브라우저에서 안전하게 불러오는 중입니다.</p>
    </div>
  </div>
  <script>
    (async()=>{
      try{
        const payloadFiles=['v9/part1.txt','v9/part2.txt','v9/part3.txt'];
        /*
         * Only the immutable base theme is injected during restoration.
         * business-info.js then bootstraps the feature/theme chain and loads
         * the single final responsive layer after every themed stylesheet.
         */
        const cssFiles=['assets/v8-base.css','assets/v8-responsive.css'];
        const [parts,styles]=await Promise.all([
          Promise.all(payloadFiles.map(async file=>{
            const response=await fetch(new URL(file,location.origin+'/'),{cache:'no-store'});
            if(!response.ok) throw new Error(`payload ${file} ${response.status}`);
            return response.text();
          })),
          Promise.all(cssFiles.map(async file=>{
            const response=await fetch(new URL(file,location.origin+'/'),{cache:'no-store'});
            if(!response.ok) throw new Error(`style ${file} ${response.status}`);
            return response.text();
          }))
        ]);

        const encoded=parts.join('');
        const raw=atob(encoded);
        const bytes=new Uint8Array(raw.length);
        for(let index=0;index<raw.length;index++) bytes[index]=raw.charCodeAt(index);

        let html=await new Response(
          new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'))
        ).text();

        html=html
          .replaceAll('https://kyungminkim11.github.io/matchal-checker/','/')
          .replaceAll('https://kyungminkim11.github.io/unfollow/','/')
          .replaceAll('/matchal-checker/','/')
          .replaceAll('/unfollow/','/');

        html=html.replace(
          /<head([^>]*)>/i,
          '<head$1><base href="/"><script async src="https://code.iconify.design/3/3.1.1/iconify.min.js"><\/script>'
        );

        const baseStyles=`<style id="unfollow-base-domain-styles">${styles.join('\n')}</style>`;
        if(/<\/head>/i.test(html)) html=html.replace(/<\/head>/i,baseStyles+'</head>');
        else html=baseStyles+html;

        const bootstrap='<script src="/assets/business-info.js?v=14.7"><\/script>';
        if(/<\/body>/i.test(html)) html=html.replace(/<\/body>/i,bootstrap+'</body>');
        else html+=bootstrap;

        document.open();
        document.write(html);
        document.close();
      }catch(error){
        console.error(error);
        const boot=document.getElementById('boot');
        if(boot) boot.innerHTML='<div class="box"><strong>페이지를 불러오지 못했습니다</strong><p>인터넷 연결을 확인한 뒤 새로고침해 주세요.</p></div>';
      }
    })();
  </script>
</body>
</html>
