<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>맞팔체커</title><meta name="description" content="로그인 없이 Instagram 데이터 ZIP으로 맞팔을 안전하게 확인하는 브라우저 로컬 분석 도구"><meta name="theme-color" content="#6557ff"><style>html,body{margin:0;min-height:100%;background:#f7f8fc;font-family:system-ui,-apple-system,"Segoe UI",sans-serif}#boot{min-height:100vh;display:grid;place-items:center;color:#475467}.box{padding:24px;text-align:center}.spin{width:38px;height:38px;margin:0 auto 14px;border:4px solid #e5e7ff;border-top-color:#6557ff;border-radius:50%;animation:s .8s linear infinite}@keyframes s{to{transform:rotate(360deg)}}</style></head><body><div id="boot"><div class="box"><div class="spin"></div><strong>맞팔체커를 준비하고 있습니다</strong><p>브라우저에서 안전하게 불러오는 중입니다.</p></div></div><script>(async()=>{try{const files=['v9/part1.txt','v9/part2.txt','v9/part3.txt'];const b64=(await Promise.all(files.map(async x=>{const r=await fetch(x,{cache:'no-store'});if(!r.ok)throw new Error(x);return r.text()}))).join('');const raw=atob(b64),u=new Uint8Array(raw.length);for(let i=0;i<raw.length;i++)u[i]=raw.charCodeAt(i);const html=await new Response(new Blob([u]).stream().pipeThrough(new DecompressionStream('gzip'))).text();document.open();document.write(html);document.close()}catch(e){console.error(e);document.getElementById('boot').innerHTML='<div class="box"><strong>페이지를 불러오지 못했습니다.</strong><p>브라우저를 새로고침하거나 Chrome·Edge 최신 버전에서 다시 열어주세요.</p></div>'}})();</script></body></html>
